baseURL = "https://blog.sapkotarajat.com.np/"
languageCode = "en-us"
title = "Rajat Sapkota"
theme = "PaperMod"
paginate = 10
buildFuture = true

# Google Analytics — replace with your GA4 Measurement ID
googleAnalytics = "G-GT75JDWDPV"

[params]
  env = "production"
  description = "AI tools, tech tutorials, motivation, finance tips, history facts, and nature wonders"
  author = "Rajat Sapkota"
  defaultTheme = "dark"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  comments = false

  # Google AdSense
  googleAdsenseId = "ca-pub-7566579332653976"

  [params.footer]
    hideCopyright = false

  [params.homeInfoParams]
    Title = "Rajat Sapkota's Blog"
    Content = "AI tools, tech tutorials, personal finance, motivation, history, and nature. New articles daily."

  [[params.socialIcons]]
    name = "youtube"
    url = "https://www.youtube.com/@rajatsapkota"

  [[params.socialIcons]]
    name = "tiktok"
    url = "https://www.tiktok.com/@sapkotarajat"

  [[params.socialIcons]]
    name = "facebook"
    url = "https://www.facebook.com/sapkotarajat/"

  [[params.socialIcons]]
    name = "instagram"
    url = "https://www.instagram.com/sapkotarajat"

# Navigation menu
[[menu.main]]
  name = "Home"
  url = "/"
  weight = 1

[[menu.main]]
  name = "Categories"
  url = "/categories/"
  weight = 2

[[menu.main]]
  name = "Tags"
  url = "/tags/"
  weight = 3

[[menu.main]]
  name = "About"
  url = "/about/"
  weight = 4

[[menu.main]]
  name = "Contact"
  url = "/contact/"
  weight = 5

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5
