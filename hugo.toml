baseURL = "https://blog.sapkotarajat.com.np/"
languageCode = "en-us"
title = "Rajat Sapkota - Tech, AI & Beyond"
theme = "PaperMod"
paginate = 10
buildFuture = true

[params]
  env = "production"
  description = "AI tools, tech tutorials, motivation, finance tips, history facts, and nature wonders"
  author = "Rajat Sapkota"
  defaultTheme = "dark"
  disableThemeToggle = true
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = false
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = false
  comments = false
  # Google AdSense - replace with your publisher ID after approval
  googleAdsenseId = ""

  [params.homeInfoParams]
    Title = "Blog"
    Content = "AI tools, tech tutorials, personal finance, motivation, history, and nature."

  [[params.socialIcons]]
    name = "youtube"
    url = "https://www.youtube.com/@rajatsapkota"

  [[params.socialIcons]]
    name = "tiktok"
    url = "https://www.tiktok.com/@sapkotarajat"

  [[params.socialIcons]]
    name = "facebook"
    url = "https://www.facebook.com/sapkotarajat/"

  [[params.socialIcons]]
    name = "instagram"
    url = "https://www.instagram.com/sapkotarajat"

[taxonomies]
  category = "categories"
  tag = "tags"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[sitemap]
  changefreq = "weekly"
  filename = "sitemap.xml"
  priority = 0.5
